<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- meta CSP 为兜底（反向代理未经后端时的 fallback）；主 CSP 由 FastAPI middleware 通过 HTTP header 下发，frame-ancestors 只在 header 中生效 -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'">
<title>周易 · 问卦</title>

<!-- 本地化 vendor：消除 CDN 供应链风险，同时便于 CSP 只放 self -->
<script src="assets/vendor/marked-15.0.12.min.js?v=__ASSET_VERSION__"></script>
<script src="assets/vendor/dompurify-3.1.5.min.js?v=__ASSET_VERSION__"></script>
<script src="assets/iching-core.js?v=__ASSET_VERSION__"></script>
<style>
/* ========== 基础重置 ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0e1612;
  --bg-deep:    #070b09;
  --bg-page:    #050a08;
  --surface:    #152220;
  --surface-hi: #1d2e2a;
  --gold:       #c9a961;
  --gold-hi:    #e8d199;
  --gold-dim:   #8a7338;
  --jade:       #3a5a4e;
  --text:       #ede4cc;
  --text-dim:   rgba(237,228,204,0.6);
  --text-faint: rgba(237,228,204,0.35);
  --line:       rgba(201,169,97,0.18);
  --line-strong:rgba(201,169,97,0.4);
  --red:        #c14242;

  --font-serif: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
  --font-sans:  "Noto Sans SC", "PingFang SC", -apple-system, system-ui, sans-serif;
}

html, body {
  background: var(--bg-page);
  color: var(--text);
  font-family: var(--font-sans);
  min-height: 100vh;
  min-height: 100svh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  overscroll-behavior: none;
}

button, textarea, input { font-family: inherit; color: inherit; }
button { touch-action: manipulation; }

/* ========== 深空背景 ========== */
.cosmos {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  background:
    radial-gradient(ellipse at 50% 35%, var(--bg-deep) 0%, #050a08 55%, #020604 100%);
}
.cosmos svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.cosmos .halo {
  position: absolute; top: 18%; left: 50%;
  width: 420px; height: 420px; margin-left: -210px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,169,97,0.18) 0%, transparent 62%);
  filter: blur(24px);
  animation: breathe-glow 7s ease-in-out infinite;
}
.cosmos .drift {
  position: absolute; top: 30%; left: 50%;
  width: 280px; height: 280px; margin-left: -140px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(58,90,78,0.35) 0%, transparent 72%);
  filter: blur(34px);
  animation: drift 11s ease-in-out infinite;
}

/* 金尘 */
.motes { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.motes .mote { position: absolute; border-radius: 50%; background: var(--gold); filter: blur(0.5px); }

/* ========== 容器 ==========
 * flex column + svh：首屏可伸缩区域（.bagua-stage）吸收浏览器高度差异，
 * compose 区锁底，确保【起卦】按钮在任意机型都在首屏内可见。
 *
 * 双声明兜底策略：每处 svh / svh-clamp 之前先写一条 px 或 vh 声明。
 * 不支持 svh 的浏览器（iOS 15.3-、Chrome 108-）无法解析后者整条会被丢弃，
 * 保留前者；现代浏览器两条都应用、后者覆盖——CSS 级联天然完成渐进增强。 */
.app {
  position: relative; z-index: 2;
  max-width: 480px;
  margin: 0 auto;
  padding: calc(env(safe-area-inset-top, 0px) + 20px) 22px calc(env(safe-area-inset-bottom, 0px) + 40px);
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
}

/* ========== 顶部元信息 ========== */
.meta-bar {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; letter-spacing: 2px; color: var(--text-dim);
  margin-bottom: 24px; min-height: 18px;
}
.meta-bar .meta-left { font-family: var(--font-serif); }
.meta-bar .meta-right { display: flex; gap: 14px; align-items: center; }
.meta-bar .icon-btn {
  background: transparent; border: none; cursor: pointer;
  width: 44px; height: 44px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: background 0.2s;
  margin-right: -10px;
}
@media (hover: hover) and (pointer: fine) {
  .meta-bar .icon-btn:hover { background: rgba(201,169,97,0.1); }
}

/* ========== 标题区 ========== */
.hero { padding: 20px 2px 0; }
.hero .kicker {
  font-family: var(--font-serif);
  font-size: 13px; letter-spacing: 6px;
  color: var(--gold); margin-bottom: 10px;
}
.hero h1 {
  font-family: var(--font-serif);
  font-size: 52px;                          /* 兜底：svh/clamp 不识别时生效 */
  font-size: clamp(40px, 6.4svh, 52px);
  font-weight: 500;
  line-height: 1; letter-spacing: 4px;
  color: var(--text);
}
.hero .tagline {
  font-family: var(--font-serif);
  font-size: 18px;                          /* 兜底 */
  font-size: clamp(15px, 2.2svh, 18px);
  letter-spacing: 8px;
  color: var(--gold-hi);
  margin-top: 14px; font-style: italic;
  animation: breathe-text 6s ease-in-out infinite;
}

/* ========== 八卦舞台 ==========
 * flex: 0 1 auto：舞台取 .bagua-float 的固有尺寸（clamp 缩放），可被压缩但不扩张——
 * 不扩张的关键在于：若扩张，会把 compose 区推到屏幕最底、副导航挤出首屏。
 * 空闲空间自然落在最后一个 flex item 下方（由 .app 的 min-height 撑起），
 * 视觉上表现为 compose + 副导航紧跟八卦盘，底部留白给安全区，符合仪式感排版。 */
.bagua-stage {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  margin: 28px 0 20px;
  flex: 0 1 auto;
  min-height: 200px;
  max-height: 340px;
  isolation: isolate;
}
.bagua-float {
  position: relative;
  width: 260px; height: 260px;              /* 兜底：svh/clamp 不识别时保持设计稿尺寸
                                             * —— 避免老浏览器里 .bagua-svg (width/height:100%)
                                             *    继承到 auto 导致八卦盘塌陷。 */
  width: clamp(200px, 32svh, 260px);
  height: clamp(200px, 32svh, 260px);
  animation: breathe-bagua 7s ease-in-out infinite, float-y 9s ease-in-out infinite;
  transition: opacity 0.5s;
}
.bagua-float .ground-shadow {
  position: absolute; left: 50%; bottom: -36px;
  width: 200px; height: 20px; transform: translateX(-50%);
  background: radial-gradient(ellipse, rgba(7,11,9,0.8) 0%, transparent 70%);
  filter: blur(10px);
  animation: shadow-pulse 9s ease-in-out infinite;
}
.bagua-float .halo-soft {
  position: absolute; inset: -60px; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,169,97,0.15) 0%, transparent 65%);
  filter: blur(12px);
  animation: halo-pulse 7s ease-in-out infinite;
}
.bagua-float .bagua-rotate {
  animation: spin-cw-very-slow 180s linear infinite;
  transform-origin: center;
}
.bagua-float .bagua-svg { width: 100%; height: 100%; display: block; }
.bagua-float .ring {
  position: absolute; border-radius: 50%; pointer-events: none;
}
.bagua-float .ring.r1 { inset: -14px; border: 1px solid var(--line-strong); animation: spin-cw 80s linear infinite; }
.bagua-float .ring.r2 { inset: -28px; border: 0.5px dashed var(--line); animation: spin-cw 120s linear infinite; }
.bagua-float .ring.r3 { inset: -46px; border: 0.5px solid var(--line); opacity: 0.6; animation: spin-cw 160s linear infinite; }
.bagua-float .orbit {
  position: absolute; top: 50%; left: 50%;
  width: 0; height: 0;
  animation: spin-cw var(--orbit-speed, 60s) linear infinite;
}
.bagua-float .orbit .star {
  position: absolute; top: -2px;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--gold-hi);
  box-shadow: 0 0 8px var(--gold), 0 0 3px var(--gold-hi);
}

/* 起卦期间隐藏落地元素（对齐设计稿：shaking 界面只留 divine-flow） */
.app.is-shaking .meta-bar,
.app.is-shaking .hero,
.app.is-shaking .bagua-stage,
.app.is-shaking .lookup { display: none; }

/* 结果页隐藏首页头部：八卦圆盘 + 问卦 hero + 月相 meta 条，聚焦卦象本身
 * 对齐设计稿 (Image #6)：result 顶部只保留 .result-top（back / 卦序 / share）。
 * .lookup（六十四卦速查）保留，设计稿底部仍有该入口。 */
.app.has-result .meta-bar,
.app.has-result .hero,
.app.has-result .bagua-stage { display: none; }

/* 铜钱容器样式（位置由 .df-coin-area 的 flex 决定）。
 * isolation: isolate 建立本地 stacking context —— halo ::before 的 z-index 只需
 * 相对于 .coins-row 内部分层，不会受 .app/.divine-flow/.df-coin-area 未来重构
 * 影响。Codex 第九轮 A-L1 防御性采纳。 */
.coins-row {
  position: relative; width: 260px; height: 170px;
  display: flex; align-items: center; justify-content: center;
  isolation: isolate;
  z-index: 0;
}
/* 铜钱区金色气场：整体 ambient 大 halo，脱离 SVG filter 合成链承担金色外扩
 * （与 .coin-wrap.shaking::after 的 per-coin 小光晕是不同层级：per-coin 给
 * 摇卦阶段的仪式感，这里给整个铜钱区的气场，两者叠加形成层次）。
 *
 * 参数参考 .cosmos .halo（420×420 + blur 24px + alpha 0.18）—— 那是已经被验证
 * "融入深空背景不喧宾夺主"的组合。这里把 alpha 微升到 0.22 + blur 略降到 22px，
 * 让起卦气场比首页氛围 halo 更显著一档，但仍保持柔雾感，不要变鸡蛋。
 *
 * 必须显式 420×420 正方形 + border-radius 50% 才是圆；
 * 若用 inset: -Npx 继承 .coins-row 260×170 尺寸 + border-radius 50%
 * 会得到椭圆 —— 历史坑。
 *
 * z-index: 0（配合 .coins-row 的 isolation）而非 -1：在本地 stacking context
 * 内，0 已沉到后面；用负值在未来若祖先有背景色会被遮。 */
.coins-row::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 50%;
  width: 420px;
  height: 420px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(201,169,97,0.22) 0%,
    transparent 60%);
  filter: blur(22px);
  pointer-events: none;
  z-index: 0;
}
.coin-wrap {
  position: absolute;
  z-index: 1;
  transition: left 0.5s cubic-bezier(.4,.2,.3,1),
              top 0.5s cubic-bezier(.4,.2,.3,1),
              transform 0.5s cubic-bezier(.4,.2,.3,1),
              opacity 0.3s;
}
/* 内层 .coin-spin 承担视觉状态（blur / scale / opacity）；不做任何旋转
 * —— "袋中摇"哲学：摇的阶段铜钱藏在手心看不清，只是朦胧的铜色球呼吸 */
.coin-spin {
  display: block;
  transition: filter 0.4s ease-out, opacity 0.4s ease-out;
}
/* 铜钱 SVG 只保留黑色投影。金色 halo 改由 .coins-row::before 伪元素承担
 * —— 彻底绕开 SVG filter 合成链。
 *
 * 历史坑：字面 buildCoinSvg 内部 <g filter="url(#cast)"> 对 text 合成时
 * feFlood 的矩形残余无法被 feComposite 完全裁掉，外层 drop-shadow(0 0 16px)
 * 把这个矩形残余 halo 化 → 铜钱背后出现硬边金棕色方块。
 * 花面（ellipse+circle，纯几何形状）无此问题；字面（text）是唯一犯罪现场。
 * 外扩 halo 搬到独立伪元素后 SVG alpha 再乱也影响不到 halo 形状。
 *
 * 硬编码 3.28px / 4.1px 与 buildCoinSvg(size=82) 绑定——app.js renderCoins
 * 固定调 size 82，不会动态变。若未来 coin size 变化，这里换成 em/px(size) 计算
 * 的 CSS 变量（如 `--coin-shadow-y`）。 */
.coin-spin svg {
  filter: drop-shadow(0 3.28px 4.1px rgba(0,0,0,0.55));
}
.coin-wrap.shaking {
  /* 外层微抖 —— 模拟手心颤动，幅度极小（2px）避免干扰中心光晕 */
  animation: coin-shake 0.2s ease-in-out infinite alternate;
}
.coin-wrap.shaking .coin-spin {
  /* 零旋转 = 零眩晕源。blur 7px 让轮廓彻底糊掉，眼睛无法"追"着看 */
  animation: coin-breathe 1s ease-in-out infinite alternate;
  filter: blur(7px) saturate(0.8);
  opacity: 0.72;
  will-change: filter, transform, opacity;
}
/* 抛落弹跳：铜钱从"袋中摇"状态跃出到 -100px 顶点，下坠一次着地，
 * 弹起 -24px 第二次着地，再微弹 -7px 归位。
 * 动画走外层 .coin-wrap 的独立 translate/rotate/filter 属性，和内联
 * style.transform='rotate(Xdeg)'（seededLayout 定位）不冲突，摆位角度保留。
 * keyframe 内嵌 animation-timing-function 分段模拟重力/弹性不同的缓动。*/
.coin-wrap.just-landed {
  animation: coin-toss 0.55s both;
}
/* 金色光晕：袋中摇时铜钱周围的"气场"，让这个阶段有东西可看，
 * 比单纯三个糊团在晃更有仪式感。用 ::after 伪元素，不占 DOM，
 * z-index: -1 沉到铜钱 SVG 之下。动画和外层 .coin-wrap 同步相位。 */
.coin-wrap.shaking::after {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(218,165,32,0.26) 0%,
    rgba(218,165,32,0.12) 42%,
    transparent 72%);
  filter: blur(6px);
  animation: halo-breathe 1.4s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: -1;
}

/* ========== 问题输入 + CTA ========== */
.compose {
  transition: opacity 0.4s, transform 0.4s;
}
.app.is-shaking .compose,
.app.has-result .compose {
  opacity: 0; transform: translateY(8px); pointer-events: none;
  height: 0; margin: 0; overflow: hidden;
}

.q-hint {
  font-size: 11px; letter-spacing: 4px; color: var(--text-faint);
  text-align: center; margin-bottom: 10px;
  font-family: var(--font-serif);
}
.q-input {
  width: 100%;
  background: var(--surface);
  border: 0.5px solid var(--line);
  border-radius: 2px;
  padding: 16px 18px;
  color: var(--text);
  font-family: var(--font-serif);
  font-size: 16px; line-height: 1.6;    /* 16px 防 iOS 放大 */
  resize: none;
  min-height: 56px;
  max-height: 140px;
  transition: border-color 0.3s, background 0.3s;
  scroll-margin-bottom: 40vh;
}
.q-input::placeholder { color: var(--text-dim); font-style: italic; }
.q-input:focus {
  outline: none;
  border-color: var(--line-strong);
  background: var(--surface-hi);
}

.cta-divine {
  position: relative;
  display: block; width: 100%;
  margin-top: 22px;
  min-height: 56px; border-radius: 2px; border: none; cursor: pointer;
  background: linear-gradient(180deg, var(--gold-hi) 0%, var(--gold) 50%, var(--gold-dim) 100%);
  font-family: var(--font-serif);
  font-size: 18px;                          /* 兜底 */
  font-size: clamp(17px, 2.4svh, 19px);
  letter-spacing: 12px; font-weight: 600;
  color: #1a1208;
  box-shadow: 0 0 30px rgba(201,169,97,0.2), inset 0 1px 0 var(--gold-hi);
  overflow: hidden;
  animation: breathe-cta 5s ease-in-out infinite;
  transition: transform 0.2s;
}
.cta-divine::before {
  content: ""; position: absolute; top: 8px; bottom: 8px; left: 12px; width: 16px;
  border-left: 1px solid rgba(26,18,8,0.3);
}
.cta-divine::after {
  content: ""; position: absolute; top: 8px; bottom: 8px; right: 12px; width: 16px;
  border-right: 1px solid rgba(26,18,8,0.3);
}
.cta-divine .shimmer {
  position: absolute; inset: 0 auto 0 0; width: 40%;
  background: linear-gradient(90deg, transparent, rgba(255,240,200,0.6), transparent);
  animation: sweep 5s ease-in-out infinite;
  pointer-events: none;
}
.cta-divine:active { transform: scale(0.985); }
.cta-divine:disabled { opacity: 0.75; cursor: not-allowed; animation: none; }
.cta-divine:disabled .shimmer { display: none; }

.cta-subnav {
  margin-top: 14px;
  display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
  font-size: 12px; letter-spacing: 3px; color: var(--text-faint);
  font-family: var(--font-serif);
}
.cta-subnav button {
  background: none; border: none; color: inherit; cursor: pointer;
  font-family: inherit; font-size: inherit; letter-spacing: inherit;
  padding: 8px 2px; min-height: 36px;
  transition: color 0.2s;
}
@media (hover: hover) {
  .cta-subnav button:hover { color: var(--gold); }
}
.cta-subnav .sep { opacity: 0.4; align-self: center; }

/* ========== 起卦流程界面（divine-flow） ========== */
.divine-flow {
  display: none;
  font-family: var(--font-serif);
  animation: slide-up 0.4s ease-out;
  /* 顶到底撑满视口（扣除 app padding），形成沉浸界面 */
  min-height: calc(100vh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 60px);
  min-height: calc(100svh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 60px);
  flex-direction: column;
}
.app.is-shaking .divine-flow { display: flex; }

/* 顶部：爻位 label + 计数 + 6 段 dashes */
.df-top { padding: 4px 0 0; }
.df-top-row {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 10px;
}
.df-yao-label { font-size: 15px; letter-spacing: 4px; color: var(--gold); }
.df-yao-count { font-size: 12px; letter-spacing: 2px; color: var(--text-dim); }

.df-dashes {
  display: flex; gap: 8px;
  padding-bottom: 6px;
}
.df-dashes > span {
  flex: 1; height: 2px; background: var(--surface-hi);
  border-radius: 1px;
  transition: background 0.4s, box-shadow 0.4s;
}
.df-dashes > span.done {
  background: var(--gold);
  box-shadow: 0 0 4px rgba(201,169,97,0.4);
}
.df-dashes > span.active {
  background: var(--gold-dim);
  animation: dash-pulse 1.2s ease-in-out infinite;
}

@keyframes dash-pulse {
  0%,100% { background: var(--gold-dim); box-shadow: 0 0 3px rgba(201,169,97,0.25); }
  50%     { background: var(--gold);     box-shadow: 0 0 6px rgba(201,169,97,0.55); }
}

/* 卦象 progressive preview — 顶部下方，小尺寸，从下往上追加 */
.df-hex-preview {
  margin: 18px auto 0;
  min-height: 100px;   /* 6 爻 × (8+4) ≈ 72px，留点呼吸 */
  display: flex; flex-direction: column; justify-content: flex-end;
  align-items: center;
}
/* 爻线与结果页 `.hexes .col .h-line` 1:1 对齐：5 段黄铜渐变、同值 inset
 * 金属边、同值 gap、transparent 中段。填充 gap 的两版尝试（暗铜 / 鎏金光）
 * 都被驳回——真正的根因是预览屏的 cosmos/coin halo 衬得 transparent gap 显"抠色"，
 * 而非 gap 本身需要填什么。先对齐第三屏，halo 侧若仍需调整再动。 */
.df-hex-preview .hex-yao {
  width: 104px; height: 8px; margin: 2px 0; position: relative; border-radius: 1px;
  opacity: 0; transform: translateY(-4px);
  transition: opacity .45s ease-out, transform .45s ease-out;
}
.df-hex-preview .hex-yao.shown { opacity: 1; transform: none; }
.df-hex-preview .hex-yao.yang {
  background: linear-gradient(90deg,
    #6b4a1c 0%, #c9a961 18%, #ead29a 50%, #c9a961 82%, #6b4a1c 100%);
  box-shadow: inset 0 1px 0 rgba(255,220,160,0.22),
              inset 0 -1px 0 rgba(0,0,0,0.35);
}
.df-hex-preview .hex-yao.yin {
  background: transparent;
  box-shadow: none;
  display: flex; gap: 18px;
}
.df-hex-preview .hex-yao.yin::before,
.df-hex-preview .hex-yao.yin::after {
  content: ""; flex: 1; height: 100%; border-radius: 1px;
  background: linear-gradient(90deg,
    #6b4a1c 0%, #c9a961 22%, #ead29a 50%, #c9a961 78%, #6b4a1c 100%);
  box-shadow: inset 0 1px 0 rgba(255,220,160,0.22),
              inset 0 -1px 0 rgba(0,0,0,0.35);
}
.df-hex-preview .hex-yao.changing {
  box-shadow: 0 0 10px rgba(232,196,119,0.65);
}

/* 铜钱区 — 占据 divine-flow 剩余垂直空间的大头，铜钱居中 */
.df-coin-area {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  min-height: 210px;
  touch-action: manipulation;
}
/* 手摇模式下铜钱区域指示可点击 */
.app.is-shaking[data-mode="manual"] .df-coin-area {
  cursor: pointer;
}
.app.is-shaking[data-mode="manual"] .df-coin-area:active .coins-row {
  transform: scale(0.96);
  transition: transform 0.15s;
}

/* 状态文字 */
.df-status { text-align: center; margin-top: 4px; }
.df-instr {
  font-size: 22px; letter-spacing: 6px; color: var(--text);
  min-height: 30px;
}
.df-hint {
  margin-top: 8px;
  font-size: 13px; letter-spacing: 2px; color: var(--text-dim);
  min-height: 22px;
}

/* 底部：字花结果（模式切换已移到 .compose，这里只剩 coinResult 居中） */
.df-bottom {
  display: flex; align-items: center; justify-content: center;
  padding: 20px 2px 6px;
  margin-top: 10px;
}

/* 分段按钮 */
.df-mode-toggle {
  display: inline-flex;
  background: rgba(21,34,32,0.7);
  border: 0.5px solid var(--line);
  border-radius: 4px;
  padding: 3px;
}
/* compose 上下文里居中放置（q-input 与起卦按钮之间） */
.df-mode-toggle-compose {
  display: flex;
  justify-content: center;
  margin: 10px auto 0;
  width: fit-content;
}
.df-mode {
  background: transparent; border: none; cursor: pointer;
  padding: 8px 18px; min-height: 36px;
  font-family: var(--font-serif);
  font-size: 14px; letter-spacing: 3px;
  color: var(--text-dim);
  border-radius: 3px;
  transition: color 0.25s, background 0.25s;
}
.df-mode.active {
  background: linear-gradient(180deg, var(--gold-hi) 0%, var(--gold) 100%);
  color: #1a1208; font-weight: 500;
  box-shadow: 0 0 10px rgba(201,169,97,0.25);
}
.df-mode:disabled { opacity: 0.5; cursor: not-allowed; }
@media (hover: hover) {
  .df-mode:not(.active):not(:disabled):hover { color: var(--gold); }
}

/* 字 · 花 · 花 结果文字 */
.df-coin-result {
  font-family: var(--font-serif);
  font-size: 18px;
  letter-spacing: 0.5em;
  color: var(--gold-hi);
  min-height: 26px;
  min-width: 7em;
  text-align: right;
  transition: opacity 0.3s;
}
.df-coin-result:empty { opacity: 0; }

/* ========== 结果区 ========== */
.result {
  margin-top: 28px;
  display: none;
}
.app.has-result .result { display: block; }

/* 结果页分层渐现（替代旧版整体 fade-in 0.25s）：
 * 顶部操作条 → 拼音铺垫 → 大字卦名（焦点 · blur+scale 凝结）→ 格言 → 六爻 → 卦辞 → tabs
 * 依次淡入，营造"天机自现"的递进仪式感。
 *
 * 节奏设计（总时长 ~2.25s，配合 app.js 内的 sleep(520) 屏息，感知总时长 ~2.8s）：
 * - 焦点段独享 0.9s 的 reveal-focus（blur 10→0 + scale 0.94→1），模拟"从虚空中凝结"；
 * - 其它段仅 opacity 渐现，合成路径简单，GPU 开销集中在焦点 blur 上；
 * - delay 错开 0.25~0.35s，单段 duration ≤ 0.65s，没有单段拖沓。
 *
 * `opacity: 0` 默认规则锚定在 `.app.has-result` 下避免污染全局 .result。
 * `.result-head` 作为容器立即显示（opacity:1），由其子元素接管分层动画——
 * 否则子元素动画在隐藏容器里跑，焦点段被吃掉。
 * animation-fill-mode: forwards 让动画结束后保持 opacity:1，不被打回默认值。 */
.app.has-result .result > * { opacity: 0; }
.app.has-result .result-head { opacity: 1; }
.app.has-result .result-head > * { opacity: 0; }

.app.has-result .result-top {
  animation: reveal-fade 0.5s 0s ease-out forwards;
}
.app.has-result .result-head .romaji {
  animation: reveal-fade 0.5s 0.25s ease-out forwards;
}
.app.has-result .result-head .hex-name {
  animation: reveal-focus 0.9s 0.55s cubic-bezier(.2,.4,.2,1) forwards;
}
.app.has-result .result-head .hex-epithet {
  animation: reveal-fade 0.5s 1.25s ease-out forwards;
}
.app.has-result .hexes {
  animation: reveal-fade 0.65s 1.0s ease-out forwards;
}
.app.has-result .judgment {
  animation: reveal-fade 0.55s 1.4s ease-out forwards;
}
.app.has-result .tabs,
.app.has-result .tab-body {
  animation: reveal-fade 0.5s 1.75s ease-out forwards;
}

@keyframes reveal-fade {
  from { opacity: 0; }
  to   { opacity: 1; }
}
/* 焦点段：字从虚空中凝结浮出。blur 10→0 做视觉锐化 + scale 0.94→1 给"凝结重量感"。
 * 单轴 scale（无 rotate/translate）配合 blur 是 compositor-friendly 的组合，走 GPU 路径，
 * 不会触发 layout reflow。缓动 cubic-bezier(.2,.4,.2,1) 起步快、尾部缓，配合字体显露弧线。 */
@keyframes reveal-focus {
  from { opacity: 0; filter: blur(10px); transform: scale(0.94); }
  to   { opacity: 1; filter: blur(0);    transform: scale(1); }
}

.result-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}
.result-top .back-btn,
.result-top .share-btn {
  width: 40px; height: 40px; display: inline-flex;
  align-items: center; justify-content: center;
  background: transparent; border: none; cursor: pointer;
  color: var(--gold); border-radius: 50%;
  transition: background 0.2s;
}
@media (hover: hover) {
  .result-top .back-btn:hover,
  .result-top .share-btn:hover { background: rgba(201,169,97,0.1); }
}
.result-top .r-num {
  font-family: var(--font-serif);
  font-size: 12px; letter-spacing: 4px; color: var(--text-dim);
}

.result-head { text-align: center; }
.result-head .romaji {
  font-size: 11px; letter-spacing: 8px; color: var(--gold);
  margin-bottom: 12px; text-transform: uppercase; min-height: 16px;
}
.result-head .hex-name {
  font-family: var(--font-serif);
  font-size: 46px;                          /* 兜底 */
  font-size: clamp(38px, 5.6svh, 46px);
  letter-spacing: 8px; font-weight: 500;
  color: var(--text); line-height: 1;
}
.result-head .hex-symbol {
  /* 设计稿 (Image #6) 结果页不单独展示大号 Unicode 三爻符号，
   * 但 #resultSymbol 节点被现有前端测试断言必须存在，所以只做视觉隐藏。 */
  display: none;
}
.result-head .hex-epithet {
  font-family: var(--font-serif);
  font-size: 14px; letter-spacing: 3px;
  color: var(--gold-hi); margin-top: 10px; font-style: italic;
}

/* 本卦 + 变卦 */
.hexes {
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 10px; align-items: center;
  padding: 28px 4px 20px;
}
.hexes .col { text-align: center; }
.hexes .col .label {
  font-size: 10px; letter-spacing: 4px; color: var(--gold);
  margin-bottom: 12px; font-family: var(--font-serif);
}
/* 设计稿 (Image #6)：标签两侧用暗金短横装饰 —— "— 本 卦 —"。
 * 用 ::before/::after 伪元素实现，DOM 不动；color: currentColor 自动跟随
 * .bian 态下 .label 的暗金色，保持本卦/变卦同一风格。*/
.hexes .col .label::before,
.hexes .col .label::after {
  content: "—";
  color: currentColor;
  margin: 0 8px;
  opacity: 0.7;
}
.hexes .col.bian { opacity: 0.75; }
.hexes .col.bian .label { color: var(--gold-dim); }
.hexes .col .lines { display: inline-flex; flex-direction: column-reverse; gap: 6px; }
/* 爻线"黄铜拓印"风（对齐设计稿 Image #6）：两端暗金→中央亮米黄的线性渐变，
 * 上下内阴影模拟金属高光/下沉，替代旧版纯米白硬对比。 */
.hexes .col .h-line {
  width: 96px; height: 8px; position: relative; border-radius: 1px;
  background: linear-gradient(90deg,
    #6b4a1c 0%, #c9a961 18%, #ead29a 50%, #c9a961 82%, #6b4a1c 100%);
  box-shadow: inset 0 1px 0 rgba(255,220,160,0.22),
              inset 0 -1px 0 rgba(0,0,0,0.35);
}
/* 变卦：铜色去饱和、压暗一档，表达"未现"之意 */
.hexes .col.bian .h-line {
  background: linear-gradient(90deg,
    #3a362e 0%, #7a766c 18%, #9a948a 50%, #7a766c 82%, #3a362e 100%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06),
              inset 0 -1px 0 rgba(0,0,0,0.3);
  opacity: 0.85;
}
.hexes .col .h-line.yin {
  background: transparent;
  box-shadow: none;
  display: flex; gap: 18px;
}
.hexes .col .h-line.yin::before,
.hexes .col .h-line.yin::after {
  content: ""; flex: 1; height: 100%; border-radius: 1px;
  background: linear-gradient(90deg,
    #6b4a1c 0%, #c9a961 22%, #ead29a 50%, #c9a961 78%, #6b4a1c 100%);
  box-shadow: inset 0 1px 0 rgba(255,220,160,0.22),
              inset 0 -1px 0 rgba(0,0,0,0.35);
}
.hexes .col.bian .h-line.yin::before,
.hexes .col.bian .h-line.yin::after {
  background: linear-gradient(90deg,
    #3a362e 0%, #7a766c 22%, #9a948a 50%, #7a766c 78%, #3a362e 100%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06),
              inset 0 -1px 0 rgba(0,0,0,0.3);
}
/* 动爻保留红色语义，同样做端部压暗的渐变保持与金色爻一致的质感 */
.hexes .col .h-line.changing {
  background: linear-gradient(90deg,
    #4a1616 0%, #c14242 18%, #e87575 50%, #c14242 82%, #4a1616 100%);
  box-shadow: inset 0 1px 0 rgba(255,180,180,0.2),
              inset 0 -1px 0 rgba(0,0,0,0.35);
}
.hexes .col .h-line.changing.yin { background: transparent; box-shadow: none; }
.hexes .col .h-line.changing.yin::before,
.hexes .col .h-line.changing.yin::after {
  background: linear-gradient(90deg,
    #4a1616 0%, #c14242 22%, #e87575 50%, #c14242 78%, #4a1616 100%);
  box-shadow: inset 0 1px 0 rgba(255,180,180,0.2),
              inset 0 -1px 0 rgba(0,0,0,0.35);
}
.hexes .col .h-line.changing::after {
  /* 中心动爻标记（只在实线上） */
}
.hexes .col .h-line.changing:not(.yin)::after {
  content: ""; position: absolute; left: 50%; top: 50%;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--red);
  transform: translate(-50%, -50%);
  box-shadow: 0 0 8px rgba(193,66,66,0.4);
}
.hexes .col .name {
  font-family: var(--font-serif);
  font-size: 15px; letter-spacing: 2px; margin-top: 12px;
  color: var(--text);
}
.hexes .col.bian .name { color: var(--text-dim); }
.hexes .arrow-col {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  color: var(--gold);
}
.hexes .arrow-col .bian-char {
  font-family: var(--font-serif); font-size: 10px; letter-spacing: 2px;
  color: var(--text-dim);
}

/* 卦辞盒 */
.judgment {
  border-top: 0.5px solid var(--line);
  border-bottom: 0.5px solid var(--line);
  padding: 22px 10px; margin: 0 2px;
  text-align: center;
  font-family: var(--font-serif);
  font-size: 18px; color: var(--gold-hi);
  letter-spacing: 4px; line-height: 1.95;
}

/* Tabs */
.tabs {
  display: flex; gap: 20px; margin-top: 24px; padding: 0 2px;
  font-family: var(--font-serif);
  font-size: 14px; letter-spacing: 3px;
  border-bottom: 0.5px solid var(--line);
}
.tabs button {
  background: none; border: none; cursor: pointer;
  padding: 12px 2px; color: var(--text-dim);
  font-family: inherit; font-size: inherit; letter-spacing: inherit;
  border-bottom: 1px solid transparent;
  margin-bottom: -1px; transition: color 0.2s, border-color 0.2s;
  min-height: 44px;
}
.tabs button.active { color: var(--gold); border-bottom-color: var(--gold); }

.tab-body {
  padding: 18px 2px 40px;
  font-family: var(--font-serif);
  font-size: 15px; line-height: 1.95;
  color: var(--text); letter-spacing: 0.5px;
}
.tab-body .pane { display: none; }
.tab-body .pane.active { display: block; }
.tab-body .pane p { margin: 0 0 0.6em; }

.lines-list { list-style: none; padding: 0; margin: 0; }
.lines-list li {
  padding: 10px 0;
  border-bottom: 1px dashed var(--line);
  font-size: 14.5px; line-height: 1.85;
}
.lines-list li:last-child { border: none; }
.lines-list li.changing-line {
  color: var(--red); text-shadow: 0 0 8px rgba(193,66,66,0.2);
}

.interp {
  font-size: 15px; line-height: 2; color: var(--text);
}
.interp h1, .interp h2, .interp h3 {
  color: var(--gold); font-size: 1.05em; margin: 1em 0 0.4em;
  letter-spacing: 2px;
}
.interp p { margin: 0.5em 0; }
.interp strong { color: var(--gold-hi); font-weight: 600; }
.interp.typing::after {
  content: "▍"; color: var(--gold); margin-left: 2px;
  animation: blink 1s step-end infinite;
}
.interp.thinking { animation: thinking-pulse 2s ease-in-out infinite; color: var(--text-dim); }
.interp-interrupted {
  margin-top: 14px; padding: 8px 12px;
  border-left: 2px solid var(--red);
  font-size: 13px; color: var(--red); opacity: 0.9;
  letter-spacing: 1px;
  font-family: var(--font-serif);
}
.retry-interp {
  display: inline-block; margin-top: 14px;
  padding: 8px 18px; min-height: 40px;
  background: transparent; border: 0.5px solid var(--line-strong);
  border-radius: 2px; cursor: pointer;
  font-family: var(--font-serif);
  font-size: 13px; letter-spacing: 3px; color: var(--gold);
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
@media (hover: hover) {
  .retry-interp:hover { background: rgba(201,169,97,0.08); color: var(--gold-hi); border-color: var(--gold); }
}

/* 错误提示 */
.error-msg {
  display: none;
  margin: 14px 0; padding: 12px 16px;
  background: rgba(193,66,66,0.12);
  border: 0.5px solid rgba(193,66,66,0.4);
  border-radius: 2px;
  color: #e87a7a; font-size: 13px; letter-spacing: 1px;
}
.error-msg.active { display: block; }

/* ========== 六十四卦速查 ========== */
.lookup {
  margin-top: 48px;
  border-top: 0.5px solid var(--line);
  padding-top: 24px;
}
.lookup-toggle {
  width: 100%; background: transparent; border: none;
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0; min-height: 48px;
  font-family: var(--font-serif);
  font-size: 15px; letter-spacing: 4px;
  color: var(--gold); cursor: pointer;
}
.lookup-toggle .arrow { font-size: 12px; transition: transform 0.3s; }
.lookup-toggle.open .arrow { transform: rotate(180deg); }
.lookup-grid {
  display: none; grid-template-columns: repeat(4, 1fr);
  gap: 8px; padding: 16px 0 20px;
}
.lookup-grid.open { display: grid; }
.hex-card {
  background: var(--surface); border: 0.5px solid var(--line);
  border-radius: 2px; padding: 14px 6px;
  text-align: center; cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}
@media (hover: hover) {
  .hex-card:hover { background: var(--surface-hi); border-color: var(--line-strong); transform: translateY(-1px); }
}
.hex-card:active { background: var(--surface-hi); }
.hex-card .card-sym { display: block; font-size: 22px; color: var(--gold-hi); line-height: 1; margin-bottom: 6px; }
.hex-card .card-name { display: block; font-family: var(--font-serif); font-size: 13px; color: var(--text); letter-spacing: 1px; }
.hex-card .card-num { display: block; font-size: 10px; color: var(--text-faint); letter-spacing: 2px; margin-top: 4px; }

/* ========== 模态 ========== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(2,6,4,0.75);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
  padding: 20px;
  animation: fade-in 0.25s;
}
.modal-overlay.active { display: flex; }
.modal-content {
  background: var(--bg);
  border: 0.5px solid var(--line-strong);
  border-radius: 2px;
  padding: 32px 26px 28px;
  max-width: 440px; width: 100%;
  max-height: 82vh; overflow-y: auto;
  position: relative;
  box-shadow: 0 10px 60px rgba(0,0,0,0.6);
}
.modal-close {
  position: absolute; top: 6px; right: 8px;
  background: none; border: none; cursor: pointer;
  font-size: 24px; line-height: 1; color: var(--text-dim);
  padding: 10px 14px; min-width: 44px; min-height: 44px;
  transition: color 0.2s;
}
@media (hover: hover) { .modal-close:hover { color: var(--gold); } }
.modal-content .m-sym { text-align: center; font-size: 42px; color: var(--gold-hi); margin: 8px 0; font-family: var(--font-serif); }
.modal-content .m-title {
  text-align: center; font-family: var(--font-serif);
  font-size: 26px; letter-spacing: 4px; color: var(--text); font-weight: 500;
}
.modal-content .m-meta {
  text-align: center; font-size: 12px; letter-spacing: 3px;
  color: var(--text-dim); margin-top: 8px; font-family: var(--font-serif);
}
.modal-content h4 {
  color: var(--gold); font-family: var(--font-serif);
  font-size: 14px; letter-spacing: 3px; margin: 22px 0 8px;
  padding-bottom: 6px; border-bottom: 0.5px solid var(--line);
}
.modal-content p { font-family: var(--font-serif); font-size: 14.5px; line-height: 1.9; color: var(--text); }
.modal-content ul { list-style: none; padding: 0; }
.modal-content ul li {
  font-family: var(--font-serif); font-size: 13.5px; line-height: 1.8;
  color: var(--text); padding: 7px 0; border-bottom: 1px dashed var(--line);
}

/* ========== 外链二次确认 ========== */
.modal-content.lc-card { padding: 26px 24px 22px; max-width: 380px; }
.lc-title {
  font-family: var(--font-serif);
  font-size: 18px; letter-spacing: 3px; color: var(--gold);
  font-weight: 500; margin-bottom: 10px;
}
.lc-hint {
  font-size: 12.5px; color: var(--text-dim); line-height: 1.7;
  margin-bottom: 14px;
}
.lc-url {
  padding: 12px 14px; margin-bottom: 18px;
  background: var(--surface);
  border: 0.5px solid var(--line);
  border-radius: 2px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12.5px; color: var(--text);
  word-break: break-all; line-height: 1.5;
  max-height: 120px; overflow-y: auto;
}
.lc-actions {
  display: flex; gap: 10px; justify-content: flex-end;
}
.lc-cancel, .lc-go {
  min-height: 44px; padding: 0 18px;
  border-radius: 2px; cursor: pointer;
  font-family: var(--font-serif);
  font-size: 14px; letter-spacing: 2px;
  transition: background 0.2s, border-color 0.2s;
}
.lc-cancel {
  background: transparent;
  border: 0.5px solid var(--line);
  color: var(--text-dim);
}
.lc-go {
  background: linear-gradient(180deg, var(--gold-hi) 0%, var(--gold) 60%, var(--gold-dim) 100%);
  border: none; color: #1a1208; font-weight: 600;
}
@media (hover: hover) {
  .lc-cancel:hover { border-color: var(--line-strong); color: var(--text); }
  .lc-go:hover { filter: brightness(1.05); }
}

/* ========== 历史抽屉 ========== */
.history-panel {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 99;
  width: 86%; max-width: 360px;
  background: var(--bg);
  border-left: 0.5px solid var(--line-strong);
  transform: translateX(100%); transition: transform 0.32s cubic-bezier(.4,.2,.3,1);
  overflow-y: auto;
  padding: calc(env(safe-area-inset-top, 0px) + 28px) 22px 40px;
  box-shadow: -10px 0 40px rgba(0,0,0,0.5);
  touch-action: pan-y;
}
.history-panel.open { transform: translateX(0); }
.history-panel h3 {
  font-family: var(--font-serif);
  font-size: 20px; letter-spacing: 6px; color: var(--gold);
  margin-bottom: 22px; font-weight: 500;
}
.history-panel .h-empty {
  color: var(--text-dim); font-size: 13px; letter-spacing: 2px;
  text-align: center; padding: 60px 0;
  font-family: var(--font-serif);
}
.history-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 4px; border-bottom: 0.5px solid var(--line);
  cursor: pointer; transition: background 0.2s;
}
@media (hover: hover) { .history-item:hover { background: var(--surface); } }
.history-item .h-sym {
  font-family: var(--font-serif);
  font-size: 22px; color: var(--gold-hi); width: 40px; text-align: center;
}
.history-item .h-main { flex: 1; min-width: 0; }
.history-item .h-name {
  font-family: var(--font-serif); font-size: 15px; letter-spacing: 2px; color: var(--text);
}
.history-item .h-q {
  font-size: 12px; color: var(--text-dim); margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.history-item .h-date {
  font-size: 11px; color: var(--text-faint); letter-spacing: 1px;
}
.history-item .h-del {
  background: none; border: none; cursor: pointer;
  color: var(--text-faint); font-size: 20px;
  padding: 8px 10px; min-width: 44px; min-height: 44px;
  transition: color 0.2s;
}
@media (hover: hover) { .history-item .h-del:hover { color: var(--red); } }
.history-backdrop {
  display: none; position: fixed; inset: 0; z-index: 98;
  background: rgba(2,6,4,0.55);
  backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
}
.history-backdrop.active { display: block; }

/* ========== 动画 ========== */
@keyframes spin-cw  { to { transform: rotate(360deg); } }
@keyframes spin-cw-very-slow { to { transform: rotate(360deg); } }
@keyframes float-y {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-12px); }
}
@keyframes shadow-pulse {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  50%      { opacity: 0.32; transform: translateX(-50%) scale(0.82); }
}
@keyframes breathe-glow {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50%      { transform: scale(1.15); opacity: 1; }
}
@keyframes drift {
  0%, 100% { transform: translate(0,0) scale(1); opacity: 0.5; }
  50%      { transform: translate(8px,-14px) scale(1.08); opacity: 0.8; }
}
@keyframes breathe-bagua {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.025); }
}
@keyframes halo-pulse {
  0%, 100% { transform: scale(0.95); opacity: 0.6; }
  50%      { transform: scale(1.15); opacity: 1; }
}
@keyframes breathe-text {
  0%, 100% { opacity: 0.7; letter-spacing: 8px; }
  50%      { opacity: 1;   letter-spacing: 10px; }
}
@keyframes breathe-cta {
  0%, 100% { box-shadow: 0 0 30px rgba(201,169,97,0.2), inset 0 1px 0 var(--gold-hi); }
  50%      { box-shadow: 0 0 50px rgba(201,169,97,0.4), inset 0 1px 0 var(--gold-hi); }
}
@keyframes sweep {
  0%   { transform: translateX(-100%); }
  60%  { transform: translateX(350%); }
  100% { transform: translateX(350%); }
}
@keyframes blink { 50% { opacity: 0; } }
@keyframes thinking-pulse {
  0%, 100% { opacity: 0.5; }
  50%      { opacity: 1; }
}
/* 外层 shake：极轻微位移（±2px）模拟手心颤动。去掉 rotate —— 袋中摇
 * 的观感是"手心在抖"而非"铜钱在翻"。用独立 translate 属性，不覆盖
 * .coin-wrap 的 style.transform='rotate(Xdeg)'（那是位置排布的固定角度）。*/
@keyframes coin-shake {
  from { translate: -2px -1px; }
  to   { translate:  2px  1px; }
}
/* 袋中摇：铜钱在"手心"里起伏呼吸，scale 微动模拟"被掌心包裹又松开"。
 * 零旋转 = 零眩晕源。有意识地与 halo-breathe 不同速率（1s vs 1.4s）
 * 制造轻度异相起伏，比完全同步更像"气息"。 */
@keyframes coin-breathe {
  from { transform: scale(0.94); }
  to   { transform: scale(1.06); }
}
/* 光晕呼吸：金色气场在铜钱周围明暗聚散。周期比 coin-breathe 略慢，
 * 两条动画叠加产生轻度 moiré 感，气场"活"起来。 */
@keyframes halo-breathe {
  from { opacity: 0.35; transform: scale(0.9);  }
  to   { opacity: 0.72; transform: scale(1.14); }
}
/* 抛落弹跳：0% 从袋中摇状态（blur 7px）跃起；15% 到顶点（-100px, blur 2px）；
 * 52% 第一次着地；64% 弹到 -24px；80% 第二次着地；90% 微弹 -7px；100% 归位。
 *
 * 单轴自转 rotateZ 从 0° 加到 360°，不涉及 X/Y 轴避免眩晕。
 * 最终 rotate 值 360deg = 0 mod 360，配合内联的 rotate(Xdeg) 总角度就是
 * seededLayout 给出的摆位角，位置还原精确。
 *
 * 每段 animation-timing-function 单独指定：
 *   ease-out 段 = 减速（到顶点 / 弹起到顶点）
 *   ease-in-like 段 = 加速（下坠）
 * 这样一个动画里就有"抛 - 坠 - 弹 - 坠 - 微弹"的分段物理感。*/
@keyframes coin-toss {
  0%   { translate: 0 0;      rotate: 0deg;   filter: blur(7px);
         animation-timing-function: cubic-bezier(.2, .6, .2, 1); }
  15%  { translate: 0 -100px; rotate: 130deg; filter: blur(2px);
         animation-timing-function: cubic-bezier(.5, 0, .85, 1); }
  52%  { translate: 0 0;      rotate: 280deg; filter: blur(0);
         animation-timing-function: cubic-bezier(.2, .7, .3, 1); }
  64%  { translate: 0 -24px;  rotate: 340deg;
         animation-timing-function: cubic-bezier(.5, 0, .85, 1); }
  80%  { translate: 0 0;      rotate: 360deg;
         animation-timing-function: cubic-bezier(.2, .7, .3, 1); }
  90%  { translate: 0 -7px;   rotate: 360deg;
         animation-timing-function: cubic-bezier(.5, 0, .85, 1); }
  100% { translate: 0 0;      rotate: 360deg; filter: blur(0); }
}
@keyframes mote-0 {
  0%, 100% { transform: translate(0,0); opacity: 0.25; }
  50%      { transform: translate(12px,-20px); opacity: 0.55; }
}
@keyframes mote-1 {
  0%, 100% { transform: translate(0,0); opacity: 0.18; }
  50%      { transform: translate(-14px,-14px); opacity: 0.48; }
}
@keyframes mote-2 {
  0%, 100% { transform: translate(0,0); opacity: 0.12; }
  50%      { transform: translate(8px,16px); opacity: 0.38; }
}
@keyframes slide-up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* 响应式
 * 两个维度正交：max-width 管窄屏字距留白；max-height 管短屏垂直压缩。
 * iPhone 12 mini (375×812) 窄不短、SE (375×667) 又窄又短、Pro Max (430×932) 宽且高——
 * 两个断点独立命中，叠加时自动合并。 */
@media (max-width: 380px) {
  .app { padding-left: 18px; padding-right: 18px; }
  .hero h1 { letter-spacing: 3px; }
  .hero .tagline { letter-spacing: 6px; }
  .cta-divine { min-height: 52px; letter-spacing: 10px; }
  .result-head .hex-name { letter-spacing: 6px; }
  .lookup-grid { grid-template-columns: repeat(3, 1fr); }
  .hexes .col .h-line { width: 86px; }
}

/* 短屏紧凑模式（tier 1：iPhone 12 mini / 13 mini / XS 等 812px 级）
 * 温和压缩垂直留白，让副导航入首屏。 */
@media (max-height: 820px) {
  .meta-bar { margin-bottom: 16px; }
  .hero { padding-top: 12px; }
  .hero .tagline { margin-top: 10px; }
  .bagua-stage { margin: 18px 0 14px; }
  .cta-divine { margin-top: 18px; }
  .lookup { margin-top: 36px; }
}

/* 短屏紧凑模式（tier 2：iPhone SE / 带地址栏的 Safari 首屏，667-720px 级）
 * 激进压缩：八卦盘覆盖到 180px，省 ~30px 保证副导航入首屏。 */
@media (max-height: 720px) {
  .app { padding-top: calc(env(safe-area-inset-top, 0px) + 8px); }
  .meta-bar { margin-bottom: 10px; }
  .hero { padding-top: 4px; }
  .hero .tagline { margin-top: 6px; }
  .bagua-stage { margin: 8px 0 6px; max-height: 200px; min-height: 160px; }
  .bagua-float { width: 180px; height: 180px; }
  .cta-divine { margin-top: 12px; }
  .cta-subnav { margin-top: 8px; }
  .lookup { margin-top: 20px; padding-top: 14px; }
}

@media (prefers-reduced-motion: reduce) {
  /* animation-delay 也清零，否则结果页分层渐现里 .tabs 的 0.9s delay
   * 对开启"减少动态效果"的用户仍会造成可见的等待。 */
  * { animation-duration: 0.001s !important; animation-delay: 0s !important; animation-iteration-count: 1 !important; transition-duration: 0.05s !important; }
}
</style>
</head>
<body>

<!-- 宇宙背景 -->
<div class="cosmos" aria-hidden="true">
  <svg id="starfield-gold" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
  <svg id="starfield-white" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
  <div class="halo"></div>
  <div class="drift"></div>
</div>
<div class="motes" aria-hidden="true" id="motes"></div>
<div class="history-backdrop" id="historyBackdrop" data-action="close-history"></div>

<!-- 主容器 -->
<main class="app" id="app">

  <div class="meta-bar">
    <span class="meta-left" id="lunarDate"></span>
    <div class="meta-right">
      <button class="icon-btn" id="btnHistory" title="卦历史" aria-label="卦历史">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="6" stroke="#c9a961" stroke-width="1" opacity="0.7"/>
          <path d="M8 4v4l2.5 1.5" stroke="#c9a961" stroke-width="1" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <header class="hero">
    <div class="kicker">易经 · I CHING</div>
    <h1>问&nbsp;卦</h1>
    <div class="tagline">诚心所至 · 天机自现</div>
  </header>

  <section class="bagua-stage" id="baguaStage">
    <div class="bagua-float" id="baguaFloat">
      <div class="ground-shadow"></div>
      <div class="halo-soft"></div>
      <div class="bagua-rotate" id="baguaRotate"></div>
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div class="orbit" style="--orbit-speed: 60s; transform: rotate(30deg);"><span class="star" style="left:144px"></span></div>
      <div class="orbit" style="--orbit-speed: 45s; transform: rotate(150deg);"><span class="star" style="left:158px"></span></div>
      <div class="orbit" style="--orbit-speed: 80s; transform: rotate(280deg);"><span class="star" style="left:176px"></span></div>
    </div>
  </section>

  <!--
    起卦流程界面（.is-shaking 时显示，替代 bagua-stage + compose）
    自顶向下：顶部进度 → 小卦象 preview → 铜钱 → 状态文字 → 模式切换 & 结果
    保留 id="shakeProgress" / "coinStage" 等向后兼容现有测试与 JS
  -->
  <section class="divine-flow" id="shakeProgress" aria-hidden="true">
    <header class="df-top">
      <div class="df-top-row">
        <span class="df-yao-label" id="tossLabel">第 壹 爻</span>
        <span class="df-yao-count" id="tossCount">1 / 6</span>
      </div>
      <div class="df-dashes" id="tossBars"></div>
    </header>

    <div class="df-hex-preview" id="hexPreview" aria-hidden="true"></div>

    <div class="df-coin-area" id="coinStage">
      <div class="coins-row" id="coinsRow"></div>
    </div>

    <div class="df-status">
      <div class="df-instr" id="tossInstr">凝神静候</div>
      <div class="df-hint" id="tossHint">铜钱自行翻转中…</div>
    </div>

    <footer class="df-bottom">
      <!-- 模式切换已移到 .compose 区（起卦前可见可点）。
           这里仅保留 "字 · 花 · 花" 的实时结果。 -->
      <div class="df-coin-result" id="coinResult" aria-live="polite"></div>
    </footer>
  </section>

  <section class="compose" id="composePanel">
    <div class="q-hint">— 心中所惑 —</div>
    <textarea
      id="question"
      class="q-input"
      placeholder="所问书于此；留白则占流年"
      rows="2"
      maxlength="140"
    ></textarea>

    <!-- 起卦模式切换：移到 compose 区保证用户起卦前可见可点。
         起卦期间 .compose 整体 opacity/pointer-events 关闭，toggle 自然不可交互；
         app.js 里 startDivine 还会主动 b.disabled=true 做键盘访问的 defense-in-depth。 -->
    <div class="df-mode-toggle df-mode-toggle-compose" role="tablist" aria-label="起卦模式">
      <button type="button" class="df-mode active" data-mode="auto" role="tab" aria-selected="true">自动</button>
      <button type="button" class="df-mode" data-mode="manual" role="tab" aria-selected="false">手摇</button>
    </div>

    <button class="cta-divine" id="btnDivine" type="button">
      <span class="shimmer"></span>起&nbsp;&nbsp;卦
    </button>

    <div class="cta-subnav">
      <button type="button" data-action="lookup-open">六十四卦速查</button>
    </div>
  </section>

  <div class="error-msg" id="errorMsg"></div>

  <section class="result" id="resultSection" aria-live="polite">
    <div class="result-top">
      <button class="back-btn" id="backBtn" type="button" aria-label="再问一卦">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="r-num" id="resultNum"></div>
      <button class="share-btn" id="shareBtn" type="button" aria-label="分享">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="5" cy="10" r="1.8" stroke="currentColor" stroke-width="1"/>
          <circle cx="15" cy="5"  r="1.8" stroke="currentColor" stroke-width="1"/>
          <circle cx="15" cy="15" r="1.8" stroke="currentColor" stroke-width="1"/>
          <path d="M6.5 9L13.5 5.8 M6.5 11L13.5 14.2" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="result-head">
      <div class="romaji" id="resultRomaji"></div>
      <div class="hex-name" id="resultName"></div>
      <div class="hex-symbol" id="resultSymbol"></div>
      <div class="hex-epithet" id="resultEpithet"></div>
    </div>

    <div class="hexes" id="hexes"></div>

    <div class="judgment" id="judgmentBox"></div>

    <div class="tabs" id="tabs">
      <button type="button" class="active" data-tab="judgment">卦辞</button>
      <button type="button" data-tab="lines">爻辞</button>
      <button type="button" data-tab="interp">卦象解读</button>
    </div>
    <div class="tab-body" id="tabBody">
      <div class="pane active" data-pane="judgment"><p id="paneJudgment"></p></div>
      <div class="pane" data-pane="lines"><ul class="lines-list" id="paneLines"></ul></div>
      <div class="pane" data-pane="interp"><div class="interp" id="paneInterp"></div></div>
    </div>
  </section>

  <section class="lookup">
    <button class="lookup-toggle" id="lookupToggle" type="button">
      <span>六十四卦速查</span>
      <span class="arrow">▼</span>
    </button>
    <div class="lookup-grid" id="lookupGrid"></div>
  </section>

</main>

<aside class="history-panel" id="historyPanel" aria-hidden="true">
  <h3>卦&nbsp;历&nbsp;史</h3>
  <div id="historyList"><div class="h-empty">尚无卦象记录</div></div>
</aside>

<div class="modal-overlay" id="modal" data-close-outside>
  <div class="modal-content" id="modalContent" role="dialog" aria-modal="true">
    <button class="modal-close" data-action="close-modal" aria-label="关闭" type="button">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- 外链二次确认 — AI 解读里的 Markdown 链接点击时显示此 modal -->
<div class="modal-overlay" id="linkConfirm" data-close-outside>
  <div class="modal-content lc-card" role="dialog" aria-modal="true" aria-labelledby="lcTitle">
    <div class="lc-title" id="lcTitle">即将打开外部链接</div>
    <div class="lc-hint">卦象解读里的链接来自模型输出，请确认 URL 可信再打开：</div>
    <div class="lc-url" id="lcUrl"></div>
    <div class="lc-actions">
      <button class="lc-cancel" id="lcCancel" type="button">取消</button>
      <button class="lc-go" id="lcGo" type="button">在新标签打开</button>
    </div>
  </div>
</div>

<script src="assets/app.js?v=__ASSET_VERSION__"></script>

</body>
</html>
